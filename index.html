<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Hub - Website HTML Fetcher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .beta-note {
            background: #f0883e;
            color: #0d1117;
            text-align: center;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #58a6ff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        input {
            flex: 1;
            padding: 14px 16px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        button {
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button:hover { background: #1f6feb; }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin: 20px 0;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
        }
        
        .tab.active {
            border-bottom: 3px solid var(--accent);
            color: var(--accent);
            font-weight: 500;
        }
        
        #result {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 400px;
            padding: 20px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre;
            line-height: 1.5;
        }
        
        .preview { border: 1px solid var(--border); border-radius: 8px; height: 600px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status { margin: 12px 0; font-size: 0.95rem; }
        .error { color: #f85149; }
        .success { color: #39d353; }
    </style>
</head>
<body>
    <div class="container">
        <div class="beta-note">
            ⚠️ BETA Version — Some websites (especially new domains) may not load due to CORS or DNS issues.
        </div>

        <header>
            <h1>GitHub Hub</h1>
            <p class="subtitle">Fetch any website's full HTML source code</p>
        </header>

        <div class="card">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://example.com" value="https://htmlfinder.org">
                <button onclick="fetchHTML()">Fetch HTML</button>
            </div>

            <div class="status" id="status">Ready</div>

            <div class="tabs">
                <div class="tab active" onclick="showTab(0)">Source Code</div>
                <div class="tab" onclick="showTab(1)">Live Preview</div>
            </div>

            <div id="sourceTab">
                <pre id="result">Enter URL and click Fetch HTML...</pre>
            </div>

            <div id="previewTab" style="display:none;">
                <div class="preview">
                    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchHTML() {
            const input = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            if (!input) {
                status.innerHTML = '<span class="error">Please enter a URL</span>';
                return;
            }

            let url = input.startsWith('http') ? input : 'https://' + input;
            status.innerHTML = `Fetching <strong>${url}</strong>...`;
            result.textContent = 'Loading...';

            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://proxy.cors.sh/${url}`
            ];

            for (let proxy of proxies) {
                try {
                    const res = await fetch(proxy);
                    if (!res.ok) continue;

                    let html = '';
                    if (proxy.includes('allorigins')) {
                        const data = await res.json();
                        html = data.contents || '';
                    } else {
                        html = await res.text();
                    }

                    if (html && html.length > 100) {
                        result.textContent = html;
                        document.getElementById('previewFrame').src = url;
                        status.innerHTML = `<span class="success">✅ Successfully loaded ${url}</span>`;
                        return;
                    }
                } catch (e) {
                    console.log("Proxy failed, trying next...");
                }
            }

            // Final fallback
            result.textContent = `❌ Could not fetch ${url}\n\nPossible reasons:\n• Domain is not live yet (DNS not propagated)\n• Website blocks external access\n• Try again in a few hours if it's a new domain`;
            status.innerHTML = '<span class="error">Failed to fetch</span>';
        }

        function showTab(n) {
            document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', i === n));
            document.getElementById('sourceTab').style.display = n === 0 ? 'block' : 'none';
            document.getElementById('previewTab').style.display = n === 1 ? 'block' : 'none';
        }

        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') fetchHTML();
        });
    </script>
</body>
</html>
